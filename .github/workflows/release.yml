name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    name: Release Please
    permissions:
      contents: write # Required to update changelog file
      pull-requests: write # Required to create release PRs
    uses: equinor/ops-actions/.github/workflows/release-please-manifest.yml@ecbe5190dbfb866ebd36d850cd68e01b873f969c # v9.35.1

  build-and-publish:
    name: Build and publish
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to upload assets to the GitHub Release
      packages: write # Required to publish packages to GitHub Packages
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Build distributions
        run: uv build

      - name: Upload release
        run: |
          gh release upload "$RELEASE_TAG" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ fromJSON(needs.release-please.outputs.path_tag_names)['.'] }}
