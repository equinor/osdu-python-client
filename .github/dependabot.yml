version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
    cooldown:
      default-days: 7
    # Prefix commit messages with "deps" to include dependency updates in patch releases
    commit-message:
      prefix: deps
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: sunday
    cooldown:
      default-days: 7
    # Prefix commit messages with "deps" to include dependency updates in patch releases
    commit-message:
      prefix: deps
